    html, body, #root { height: 100%; margin: 0; }
    body { background: #f0eee9; } /* design canvas warm-gray bg */
    /* hide the design system's body grid/orbs in the canvas backdrop;
       each artboard owns its own dark canvas */
    body::before, body::after { display: none; }
  </style>

  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<body>
  <div id="root"></div>

  <!-- Theme controller (global theme switcher) -->
  <script>
    (function() {
      const THEMES = ['cyber', 'matrix', 'synthwave', 'amber', 'glacier', 'paper', 'mono'];
      const KEY = 'workbench:theme';
      function clearThemeClasses() {
        const cls = document.body.classList;
        [...cls].forEach(c => { if (c.indexOf('theme-') === 0) cls.remove(c); });
      }
      window.setTheme = function(name) {
        clearThemeClasses();
        if (name && name !== 'cyber') document.body.classList.add('theme-' + name);
        try { localStorage.setItem(KEY, name || 'cyber'); } catch (e) {}
        window.dispatchEvent(new CustomEvent('themechange', { detail: { theme: name || 'cyber' } }));
      };
      window.getTheme = function() {
        try { return localStorage.getItem(KEY) || 'cyber'; } catch (e) { return 'cyber'; }
      };
      // Apply on load
      const saved = window.getTheme();
      if (saved && saved !== 'cyber') document.body.classList.add('theme-' + saved);
    })();
  </script>
